<style>
* {
margin: 0;
padding: 0;

color: black;

.btn-primary:hover {

.dashboard {

background: var(--card);

.grid {

grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));

border: 1px solid rgba(255,255,255,0.08);

.card h3 {

.card p {

.feature-box {

}

.feature-box h3 {

<script>
const particlesContainer = document.getElementById('particles');

for (let i = 0; i < 70; i++) {
const particle = document.createElement('div');
particle.classList.add('particle');
particle.style.left = Math.random() * 100 + 'vw';
particle.style.animationDuration = (Math.random() * 5 + 4) + 's';
particle.style.opacity = Math.random();
particlesContainer.appendChild(particle);
}

function showAlert() {
const terminal = document.getElementById('terminal');

terminal.innerHTML += '<br>> Escaneando archivos del sistema...';

setTimeout(() => {
terminal.innerHTML += '<br>> Verificando integridad HTML...';
}, 1000);

setTimeout(() => {
terminal.innerHTML += '<br>> No se detectaron alteraciones.';
}, 2000);
}

function simulateHack() {
document.body.classList.add('hacked');

document.querySelector('.hero-text h1').innerHTML = 'SITE <span>HACKED</span>';

document.querySelector('.hero-text p').innerHTML =
'⚠ Integridad comprometida. Se detectó un posible ataque de defacement en el sistema.';

document.getElementById('status').innerText = 'Comprometido';
document.getElementById('status').style.background = 'rgba(255,0,0,0.15)';
document.getElementById('status').style.color = '#ff4d4d';

document.getElementById('integrity').innerText = '12%';

document.getElementById('terminal').innerHTML = `
> ALERTA CRÍTICA DETECTADA<br>
> Modificación no autorizada encontrada<br>
> Página principal alterada<br>
> Activando protocolo de contención...<br>
> Registrando incidente de seguridad...
`;

let threats = document.getElementById('threats');
threats.innerText = parseInt(threats.innerText) + 1;
}
</script>
